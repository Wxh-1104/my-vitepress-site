name: Deploy VitePress site to Pages

on:
  push:
    branches: ["main"]   # 如果你用的是 master，就改成 master
  workflow_dispatch:     # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm   # 缓存依赖，加快构建

      - name: Install dependencies
        run: npm ci   # 比 npm install 更干净

      - name: Build VitePress site
        run: NODE_OPTIONS="--max-old-space-size=8192" npx vitepress build docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist  # VitePress build 输出目录

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
